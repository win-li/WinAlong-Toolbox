# WinAlong Toolbox default configuration.
# Override locally with config/local.conf (ignored by Git).
WAT_PROJECT_NAME="WinAlong Toolbox"
WAT_VERSION="1.1.0"
WAT_INSTALL_DIR="/opt/winalong-toolbox"
WAT_BIN_LINK="/usr/local/bin/winalong"
WAT_LOG_DIR="/var/log/winalong-toolbox"
WAT_BACKUP_DIR="/var/backups/winalong-toolbox"
WAT_SWAP_FILE="/swapfile"
WAT_SWAP_SIZE="2G"
WAT_PORTAINER_IMAGE="portainer/portainer-ce:lts"
WAT_PORTAINER_CONTAINER="portainer"
WAT_PORTAINER_VOLUME="portainer_data"
WAT_PORTAINER_BIND="127.0.0.1"
WAT_PORTAINER_PORT="9443"
WAT_BACKUP_IMAGE="alpine:3.23.5"
