# Safe application catalog defaults. All web interfaces bind to localhost.
WAT_APPS_BIND="127.0.0.1"
WAT_APPS_NETWORK="winalong_apps"

WAT_NGINX_IMAGE="nginx:stable-alpine"
WAT_NGINX_CONTAINER="winalong-nginx"
WAT_NGINX_VOLUME="winalong_nginx_html"
WAT_NGINX_PORT="8080"

WAT_UPTIME_IMAGE="louislam/uptime-kuma:2"
WAT_UPTIME_CONTAINER="winalong-uptime-kuma"
WAT_UPTIME_VOLUME="winalong_uptime_kuma_data"
WAT_UPTIME_PORT="3001"
